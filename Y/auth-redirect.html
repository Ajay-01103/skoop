<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skoop - Auth Action</title>
  <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <style>
    :root {
      --primary: #7F3DFF;
      --primary-dark: #6d2de0;
      --bg: #F9F9F9;
      --text-dark: #1C1C1E;
      --text-muted: #8E8E93;
      --error: #e74c3c;
      --success: #2a6b3d;
      --white: #ffffff;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Bricolage Grotesque', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      color: var(--text-dark);
    }
    
    .wrapper {
      width: 100%;
      max-width: 420px;
    }
    
    .header {
      text-align: center;
      margin-bottom: 32px;
    }
    
    .header-logo {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      font-weight: 700;
      font-size: 18px;
      color: var(--text-dark);
    }
    
    .header-logo span {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--primary);
      border-radius: 8px;
      color: var(--white);
      font-size: 18px;
    }
    
    .container {
      background: var(--white);
      border-radius: 12px;
      padding: 48px 32px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
      animation: slideUp 0.4s ease-out;
    }
    
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .icon {
      font-size: 56px;
      margin-bottom: 24px;
      display: inline-block;
      color: var(--primary);
      animation: iconPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    
    @keyframes iconPop {
      0% {
        transform: scale(0);
        opacity: 0;
      }
      50% {
        transform: scale(1.1);
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }
    
    .icon.success {
      color: var(--success);
    }
    
    .icon.error {
      color: var(--error);
    }
    
    .icon.warning {
      color: #f39c12;
    }
    
    h1 {
      font-size: 28px;
      color: var(--text-dark);
      margin-bottom: 12px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    
    .subtitle {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 28px;
      line-height: 1.6;
    }
    
    .spinner-wrapper {
      text-align: center;
      margin: 24px 0;
    }
    
    .loader {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 3px solid rgba(127, 61, 255, 0.1);
      border-top: 3px solid var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .form-group {
      margin-bottom: 16px;
    }
    
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      color: var(--text-dark);
      transition: all 0.2s;
      background: var(--white);
    }
    
    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(127, 61, 255, 0.1);
    }
    
    .form-group input::placeholder {
      color: var(--text-muted);
    }
    
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 28px;
    }
    
    .btn {
      display: inline-block;
      padding: 12px 24px;
      background: var(--primary);
      color: var(--white);
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .btn:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(127, 61, 255, 0.3);
    }
    
    .btn:active {
      transform: translateY(0);
    }
    
    .btn.secondary {
      background: var(--white);
      color: var(--primary);
      border: 1.5px solid var(--primary);
    }
    
    .btn.secondary:hover {
      background: rgba(127, 61, 255, 0.05);
      box-shadow: 0 2px 8px rgba(127, 61, 255, 0.15);
    }
    
    .error-detail {
      background: rgba(231, 76, 60, 0.05);
      border-left: 3px solid var(--error);
      padding: 12px;
      border-radius: 4px;
      margin-top: 12px;
      font-size: 12px;
      color: #c0392b;
      font-family: 'Monaco', monospace;
      text-align: left;
      word-break: break-all;
    }
    
    .success-message {
      background: rgba(42, 107, 61, 0.05);
      border-left: 3px solid var(--success);
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 16px;
      font-size: 13px;
      color: var(--text-dark);
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <div class="header-logo">
        <span class="material-icons-round">storefront</span>
        Skoop
      </div>
    </div>
    <div class="container" id="container">
      <span class="material-icons-round icon">hourglass_empty</span>
      <h1>Processing...</h1>
      <p class="subtitle">Please wait while we complete your request.</p>
      <div class="spinner-wrapper">
        <div class="loader"></div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCPN-DiCXA6qEbSeLlIW_O8IXiTz575OM4",
      authDomain: "thisisskoop.firebaseapp.com",
      projectId: "thisisskoop",
      storageBucket: "thisisskoop.firebasestorage.app",
      messagingSenderId: "79877900507",
      appId: "1:79877900507:web:bc4496ce8d838b83a724fe"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Get query parameters
    const params = new URLSearchParams(window.location.search);
    let mode = params.get('mode');
    let oobCode = params.get('oobCode');
    const apiKey = params.get('apiKey');

    // Debug: Log what we're receiving
    console.log('Auth Redirect - Mode:', mode, 'Code:', oobCode ? 'Present' : 'Missing');

    async function handleAuthAction() {
      const container = document.getElementById('container');

      try {
        if (!mode || !oobCode) {
          throw new Error('Invalid auth link');
        }

        if (mode === 'verifyEmail') {
          // Email verification
          await auth.applyActionCode(oobCode);
          
          // Get current user and update their profile
          const user = auth.currentUser;
          if (user) {
            // Reload to get updated email verification status
            await user.reload();
            
            // Update Firestore to mark as verified seller
            await db.collection('users').doc(user.uid).update({
              emailVerified: true,
              verifiedSeller: true
            });
          }
          
          container.innerHTML = `
            <span class="material-icons-round icon success">check_circle</span>
            <h1>Email Verified! ✓</h1>
            <p class="subtitle">Your email has been successfully verified. You can now use all features of Skoop as a verified seller.</p>
            <div class="success-message">
              You're all set and ready to start selling on Skoop!
            </div>
            <div class="btn-group">
              <button class="btn" onclick="redirectHome()">Go to Skoop</button>
            </div>
          `;
        } 
        else if (mode === 'resetPassword') {
          // Password reset
          // Verify the code first
          await auth.verifyPasswordResetCode(oobCode);
          container.innerHTML = `
            <span class="material-icons-round icon">vpn_key</span>
            <h1>Reset Password</h1>
            <p class="subtitle">Enter your new password below.</p>
            <div class="form-group">
              <label>New Password</label>
              <input type="password" id="newPassword" placeholder="Minimum 6 characters" autocomplete="new-password">
            </div>
            <div class="form-group">
              <label>Confirm Password</label>
              <input type="password" id="confirmPassword" placeholder="Re-enter your password" autocomplete="new-password">
            </div>
            <div class="btn-group">
              <button class="btn" onclick="resetPassword('${oobCode}')">Update Password</button>
              <button class="btn secondary" onclick="redirectHome()">Cancel</button>
            </div>
          `;
        } 
        else {
          throw new Error('Unknown action');
        }
      } catch (error) {
        console.error('Auth error:', error);
        let errorMsg = 'Something went wrong';
        
        if (error.code === 'auth/invalid-action-code' || error.code === 'auth/expired-action-code') {
          errorMsg = 'This link has expired or is invalid. Please request a new one.';
        } else if (error.code === 'auth/invalid-oob-code') {
          errorMsg = 'Invalid link. Please request a new one.';
        } else if (error.message === 'Invalid auth link') {
          errorMsg = 'Invalid auth link. Please check your email for the correct link.';
        } else if (error.message && error.message.includes('auth/invalid')) {
          errorMsg = 'The authentication code is invalid. Please request a new link.';
        }

        container.innerHTML = `
          <span class="material-icons-round icon error">error_outline</span>
          <h1>Something Went Wrong</h1>
          <p class="subtitle">${errorMsg}</p>
          <div class="error-detail">
            ${error.code || error.message}
          </div>
          <div class="btn-group" style="margin-top: 24px;">
            <button class="btn secondary" onclick="window.location.reload()">Try Again</button>
            <button class="btn" onclick="redirectHome()">Back Home</button>
          </div>
        `;
      }
    }

    async function resetPassword(oobCode) {
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (!newPassword || !confirmPassword) {
        alert('Please fill in both fields');
        return;
      }

      if (newPassword.length < 6) {
        alert('Password must be at least 6 characters');
        return;
      }

      if (newPassword !== confirmPassword) {
        alert('Passwords do not match');
        return;
      }

      try {
        const container = document.getElementById('container');
        container.innerHTML = `
          <span class="material-icons-round icon">hourglass_empty</span>
          <h1>Updating...</h1>
          <p class="subtitle">Please wait while we update your password.</p>
          <div class="spinner-wrapper">
            <div class="loader"></div>
          </div>
        `;

        await auth.confirmPasswordReset(oobCode, newPassword);

        container.innerHTML = `
          <span class="material-icons-round icon success">check_circle</span>
          <h1>Password Updated! ✓</h1>
          <p class="subtitle">Your password has been successfully reset. You can now sign in with your new password.</p>
          <div class="success-message">
            Return to Skoop and log in with your new password.
          </div>
          <div class="btn-group">
            <button class="btn" onclick="redirectHome()">Go to Skoop</button>
          </div>
        `;
      } catch (error) {
        console.error('Password reset error:', error);
        document.getElementById('container').innerHTML = `
          <span class="material-icons-round icon error">error_outline</span>
          <h1>Reset Failed</h1>
          <p class="subtitle">We couldn't update your password. Please try again.</p>
          <div class="error-detail">
            ${error.message || 'Unknown error'}
          </div>
          <div class="btn-group" style="margin-top: 24px;">
            <button class="btn secondary" onclick="window.location.reload()">Try Again</button>
            <button class="btn" onclick="redirectHome()">Back Home</button>
          </div>
        `;
      }
    }

    function redirectHome() {
      window.location.href = '../index.html';
    }

    // Start the process
    handleAuthAction();
  </script>
</body>
</html>
