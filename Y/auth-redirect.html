<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skoop - Auth Action</title>
  <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Bricolage Grotesque', sans-serif;
      background: linear-gradient(135deg, #f9f9f9 0%, #f5f5f5 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 16px;
      padding: 40px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
      text-align: center;
    }
    
    .icon {
      font-size: 64px;
      margin-bottom: 20px;
      display: inline-block;
      color: #7F3DFF;
    }
    
    .icon.error {
      color: #e74c3c;
    }
    
    .icon.warning {
      color: #f39c12;
    }
    
    h1 {
      font-size: 24px;
      color: #1C1C1E;
      margin-bottom: 12px;
      font-weight: 600;
    }
    
    p {
      color: #8E8E93;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    
    .loader {
      display: inline-block;
      width: 30px;
      height: 30px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #7F3DFF;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 20px 0;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .btn {
      display: inline-block;
      padding: 12px 24px;
      background: #7F3DFF;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
      margin-top: 20px;
    }
    
    .btn:hover {
      background: #6d2de0;
    }
    
    .btn.secondary {
      background: #F9F9F9;
      color: #7F3DFF;
      border: 2px solid #7F3DFF;
    }
    
    .btn.secondary:hover {
      background: #f0f0f0;
    }
    
    .btn-group {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }
    
    .btn-group .btn {
      flex: 1;
      margin: 0;
    }
    
    code {
      background: #f5f5f5;
      padding: 4px 8px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
      color: #1C1C1E;
    }
  </style>
</head>
<body>
  <div class="container" id="container">
    <span class="material-icons-round icon">hourglass_empty</span>
    <h1>Processing...</h1>
    <p>Please wait while we complete your request.</p>
    <div class="loader"></div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCPN-DiCXA6qEbSeLlIW_O8IXiTz575OM4",
      authDomain: "thisisskoop.firebaseapp.com",
      projectId: "thisisskoop",
      storageBucket: "thisisskoop.firebasestorage.app",
      messagingSenderId: "79877900507",
      appId: "1:79877900507:web:bc4496ce8d838b83a724fe"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Get query parameters
    const params = new URLSearchParams(window.location.search);
    const mode = params.get('mode');
    const oobCode = params.get('oobCode');
    const apiKey = params.get('apiKey');

    async function handleAuthAction() {
      const container = document.getElementById('container');

      try {
        if (!mode || !oobCode) {
          throw new Error('Invalid auth link');
        }

        if (mode === 'verifyEmail') {
          // Email verification
          await auth.applyActionCode(oobCode);
          
          // Get current user and update their profile
          const user = auth.currentUser;
          if (user) {
            // Reload to get updated email verification status
            await user.reload();
            
            // Update Firestore to mark as verified seller
            await db.collection('users').doc(user.uid).update({
              emailVerified: true,
              verifiedSeller: true
            });
          }
          
          container.innerHTML = `
            <span class="material-icons-round icon">check_circle</span>
            <h1>Email Verified!</h1>
            <p>Your email has been successfully verified. You can now use all features of Skoop as a verified seller.</p>
            <button class="btn" onclick="redirectHome()">Go to Skoop</button>
          `;
        } 
        else if (mode === 'resetPassword') {
          // Password reset
          // Verify the code first
          await auth.verifyPasswordResetCode(oobCode);
          container.innerHTML = `
            <span class="material-icons-round icon">vpn_key</span>
            <h1>Reset Your Password</h1>
            <p>Enter your new password below.</p>
            <div style="margin: 20px 0; text-align: left;">
              <input type="password" id="newPassword" placeholder="New password (min 6 chars)" style="width:100%; padding:10px; border:1px solid #e0e0e0; border-radius:8px; font-family: inherit; margin-bottom:10px;">
              <input type="password" id="confirmPassword" placeholder="Confirm password" style="width:100%; padding:10px; border:1px solid #e0e0e0; border-radius:8px; font-family: inherit;">
            </div>
            <button class="btn" onclick="resetPassword('${oobCode}')">Update Password</button>
            <button class="btn secondary" onclick="redirectHome()">Back Home</button>
          `;
        } 
        else {
          throw new Error('Unknown action');
        }
      } catch (error) {
        console.error('Auth error:', error);
        let errorMsg = 'Something went wrong';
        
        if (error.code === 'auth/invalid-action-code' || error.code === 'auth/expired-action-code') {
          errorMsg = 'This link has expired. Please request a new one.';
        } else if (error.code === 'auth/invalid-oob-code') {
          errorMsg = 'Invalid link. Please request a new one.';
        } else if (error.message === 'Invalid auth link') {
          errorMsg = 'Invalid auth link';
        }

        container.innerHTML = `
          <span class="material-icons-round icon error">error_outline</span>
          <h1>Oops!</h1>
          <p>${errorMsg}</p>
          <button class="btn" onclick="redirectHome()">Back Home</button>
        `;
      }
    }

    async function resetPassword(oobCode) {
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (!newPassword || !confirmPassword) {
        alert('Please fill in both fields');
        return;
      }

      if (newPassword.length < 6) {
        alert('Password must be at least 6 characters');
        return;
      }

      if (newPassword !== confirmPassword) {
        alert('Passwords do not match');
        return;
      }

      try {
        const container = document.getElementById('container');
        container.innerHTML = `
          <span class="material-icons-round icon">hourglass_empty</span>
          <h1>Updating...</h1>
          <p>Please wait while we update your password.</p>
          <div class="loader"></div>
        `;

        await auth.confirmPasswordReset(oobCode, newPassword);

        container.innerHTML = `
          <span class="material-icons-round icon">check_circle</span>
          <h1>Password Updated!</h1>
          <p>Your password has been successfully reset. You can now sign in with your new password.</p>
          <button class="btn" onclick="redirectHome()">Go to Skoop</button>
        `;
      } catch (error) {
        console.error('Password reset error:', error);
        document.getElementById('container').innerHTML = `
          <span class="material-icons-round icon error">error_outline</span>
          <h1>Error</h1>
          <p>Failed to reset password. Please try again.</p>
          <button class="btn" onclick="window.location.reload()">Retry</button>
          <button class="btn secondary" onclick="redirectHome()">Back Home</button>
        `;
      }
    }

    function redirectHome() {
      window.location.href = '../index.html';
    }

    // Start the process
    handleAuthAction();
  </script>
</body>
</html>
